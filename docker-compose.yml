version: "3.9"

# Por defecto: solo lo necesario para n8n + LibreChat + launcher + nginx (menor uso de RAM/CPU).
#   docker compose up -d
# Opcional Chatwoot (requiere Redis):
#   docker compose --profile full up -d
# Opcional Marimo y Bolt:
#   docker compose --profile extras up -d
# Combinar: docker compose --profile full --profile extras up -d

services:

  # =======================
  # BASE DE DATOS
  # =======================

  # PostgreSQL (Chatwoot + puede alojar la BD de n8n según tu .env.n8n).
  # DBeaver desde tu PC a EC2:
  #   A) Túnel SSH (recomendado): puerto mapeado solo a 127.0.0.1 →
  #      ssh -i tu.pem -L 5433:127.0.0.1:5432 ec2-user@IP_PUBLICA
  #      En DBeaver: localhost:5433, usuario/contraseña de la BD n8n (p. ej. n8n/n8n).
  #   B) Acceso directo: cambia el mapeo a "0.0.0.0:5432:5432" y en el Security Group de EC2
  #      permite TCP 5432 solo desde tu IP (riesgo si expones credenciales).
  postgres:
    image: pgvector/pgvector:pg15
    container_name: postgres
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatwoot_secure_pass_2024}
      POSTGRES_DB: chatwoot
      TZ: ${TIMEZONE:-America/Bogota}
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=16MB
      -c effective_cache_size=128MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5432}:5432"
    networks:
      - ai_stack
    mem_limit: 200m
    shm_size: 64m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    profiles:
      - full
    image: redis:7-alpine
    container_name: redis
    environment:
      TZ: ${TIMEZONE:-America/Bogota}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass_2024} --maxmemory 50mb --maxmemory-policy allkeys-lru --save "" --appendfsync no
    volumes:
      - redis_data:/data
    networks:
      - ai_stack
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass_2024}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  mongo:
    image: mongo:6.0
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-librechat}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_secure_pass_2024}
      TZ: ${TIMEZONE:-America/Bogota}
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    command: mongod --wiredTigerCacheSizeGB 0.25 --quiet --logpath /dev/null
    volumes:
      - mongo_data:/data/db
    networks:
      - ai_stack
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # =======================
  # APLICACIONES

  chatwoot:
    profiles:
      - full
    image: chatwoot/chatwoot:latest
    container_name: chatwoot
    env_file:
      - .env.chatwoot
    environment:
      - TZ=${TIMEZONE:-America/Bogota}
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://chatwoot:${POSTGRES_PASSWORD:-chatwoot_secure_pass_2024}@postgres:5432/chatwoot
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass_2024}@redis:6379/0
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_MAX_THREADS=3
      - WEB_CONCURRENCY=1
      - MALLOC_ARENA_MAX=2
      - RUBY_GC_HEAP_INIT_SLOTS=100000
      - RUBY_GC_HEAP_FREE_SLOTS_MIN_RATIO=0.2
      - RUBY_GC_HEAP_FREE_SLOTS_MAX_RATIO=0.4
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    networks:
      - ai_stack
    mem_limit: 400m
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chatwoot_sidekiq:
    profiles:
      - full
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_sidekiq
    env_file:
      - .env.chatwoot
    environment:
      - TZ=${TIMEZONE:-America/Bogota}
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://chatwoot:${POSTGRES_PASSWORD:-chatwoot_secure_pass_2024}@postgres:5432/chatwoot
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass_2024}@redis:6379/0
      - MALLOC_ARENA_MAX=2
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    networks:
      - ai_stack
    mem_limit: 300m
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    env_file:
      - .env.n8n
    # Invitaciones por email: verifica identidad en SES (p. ej. cloudformation-ses.yaml), crea
    # credenciales SMTP en la consola SES y en .env.n8n define, por ejemplo:
    #   N8N_EMAIL_MODE=smtp
    #   N8N_SMTP_HOST=email-smtp.us-east-1.amazonaws.com
    #   N8N_SMTP_PORT=587
    #   N8N_SMTP_USER=<usuario SMTP de SES>
    #   N8N_SMTP_PASS=<contraseña SMTP de SES>
    #   N8N_SMTP_SENDER=no-reply@tu-dominio-verificado.com
    environment:
      - TZ=${TIMEZONE:-America/Bogota}
      - NODE_OPTIONS=--max-old-space-size=256
    restart: "no"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai_stack
    mem_limit: 300m
    depends_on:
      postgres:
        condition: service_healthy

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    env_file:
      - .env.librechat
    # OPENROUTER_KEY: usado en librechat.yaml (OpenRouter + títulos de conv. para endpoint Google Gemini).
    environment:
      - OPENROUTER_KEY=${OPENROUTER_KEY:-}
    restart: "no"
    volumes:
      - librechat-images:/app/client/public/images
      - librechat-logs:/app/api/logs
      - librechat-data:/app/api/data
      - ./librechat.yaml:/app/librechat.yaml:Z
    networks:
      - ai_stack
    mem_limit: 256m
    depends_on:
      mongo:
        condition: service_healthy

  # =======================
  # MARIMO
  # =======================

  marimo:
    profiles:
      - extras
    build:
      context: ./marimo
      dockerfile: Dockerfile
    container_name: marimo
    environment:
      - TZ=${TIMEZONE:-America/Bogota}
      - OPENROUTER_KEY=${OPENROUTER_KEY}
    restart: "no"
    volumes:
      - marimo_notebooks:/root/notebooks
    networks:
      - ai_stack
    mem_limit: 512m

  # =======================
  # BOLT.DIY
  # =======================

  bolt:
    profiles:
      - extras
    #build:
      #context: ./bolt
    image: bolt-ai:production
    container_name: bolt
    environment:
      - NODE_ENV=production
      - RUNNING_IN_DOCKER=true
    volumes:
      - ./bolt.diy/.env.local:/app/.env.local:ro
    restart: "no"
    networks:
      - ai_stack
    mem_limit: 512m

  # =======================
  # LAUNCHER (on-demand service activator)
  # =======================

  launcher:
    build:
      context: ./launcher
      dockerfile: Dockerfile
    container_name: launcher
    # Mismas credenciales BD que n8n (DB_POSTGRESDB_*) para métricas sin duplicar contraseña en N8N_POSTGRES_DSN.
    env_file:
      - .env.n8n
    environment:
      - AUTH_USER=${BOLT_AUTH_USER:-admin}
      - AUTH_PASSWORD=${BOLT_AUTH_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      # Mongo: credenciales root (authSource=admin) + nombre de BD LibreChat en el path.
      # Si tu BD tiene otro nombre, cambia el path y/o define LIBRECHAT_MONGO_DB con el mismo nombre.
      - MONGO_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/LibreChat?authSource=admin
      - LIBRECHAT_MONGO_DB=${LIBRECHAT_MONGO_DB:-LibreChat}
      - N8N_INTERNAL_URL=http://n8n:5678
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_OWNER_EMAIL=${BOLT_AUTH_USER}
      - N8N_OWNER_PASSWORD=${BOLT_AUTH_PASSWORD}
      # Opcional: métricas n8n en gestión. Si está vacío, el launcher arma el DSN desde .env.n8n (DB_POSTGRESDB_*).
      # Para fijarlo a mano, en el .env junto a este compose (no commitear secretos):
      #   N8N_POSTGRES_DSN=postgres://USUARIO:CONTRASEÑA@postgres:5432/n8n?sslmode=disable
      # Ejemplo usuario/contraseña literales "n8n"/"n8n":
      #   N8N_POSTGRES_DSN=postgres://n8n:n8n@postgres:5432/n8n?sslmode=disable
      # Si la contraseña tiene @ : # / etc., codifícala (ej. @ -> %40) o deja N8N_POSTGRES_DSN vacío y usa solo DB_POSTGRESDB_PASSWORD en .env.n8n.
      - N8N_POSTGRES_DSN=${N8N_POSTGRES_DSN:-}
      # Empresas (LibreChat + asignación n8n en JSON local). Separadas por comas; default = primera de la lista.
      - GESTION_COMPANIES=${GESTION_COMPANIES:-default}
      - GESTION_DEFAULT_COMPANY=${GESTION_DEFAULT_COMPANY:-default}
      # Persistir el mapa email→empresa de n8n (sin esto, en contenedor suele usarse /tmp y se pierde al reiniciar).
      - GESTION_COMPANY_STORE=/data/gestion_company_store.json
      # SES Email configuration
      - SES_SMTP_HOST=${SES_SMTP_HOST:-email-smtp.us-east-1.amazonaws.com}
      - SES_SMTP_PORT=465
      - SES_SMTP_USER=${SES_SMTP_USER}
      - SES_SMTP_PASSWORD=${SES_SMTP_PASSWORD}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      - SES_REGION=${SES_REGION:-us-east-1}
    volumes:
      - /var/run/docker-agent.sock:/var/run/docker-agent.sock:ro
      - launcher_company_store:/data
    networks:
      - ai_stack
    mem_limit: 128m
    restart: unless-stopped

  # =======================
  # REVERSE PROXY - Nginx
  # =======================

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - postgres
      - mongo
      - launcher
    networks:
      - ai_stack
    restart: unless-stopped

networks:
  ai_stack:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  launcher_company_store:
  n8n_data:
  librechat-images:
  librechat-logs:
  librechat-data:
  marimo_notebooks:

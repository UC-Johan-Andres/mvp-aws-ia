worker_processes auto;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=16k;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Resolver DNS interno de Docker
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ======================
    # SSL — compartido por todos los bloques HTTPS
    # Certbot escribe en /etc/letsencrypt/live/n8ntest.soylideria.com/
    # porque es el primer dominio del comando certonly
    # ======================
    ssl_certificate     /etc/letsencrypt/live/n8ntest.soylideria.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8ntest.soylideria.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ======================
    # HTTP — ACME challenge + redirect a HTTPS (todos los dominios)
    # ======================
    server {
        listen 80;
        server_name n8ntest.soylideria.com chatwoottest.soylideria.com chat.soylideria.com marimo.soylideria.com bolttest.soylideria.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ======================
    # n8ntest.soylideria.com → n8n
    # ======================
    server {
        listen 443 ssl default_server;
        server_name n8ntest.soylideria.com;

        error_page 502 503 504 = @launcher;

        location / {
            set $backend "n8n:5678";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_intercept_errors on;
        }

        location /services/ {
            proxy_pass http://launcher:8090/services/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location @launcher {
            proxy_pass http://launcher:8090;
            proxy_set_header Host $host;
        }
    }

    # ======================
    # chatwoottest.soylideria.com → Chatwoot
    # ======================
    server {
        listen 443 ssl;
        server_name chatwoottest.soylideria.com;

        error_page 502 503 504 = @launcher;

        location / {
            set $backend "chatwoot:3000";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_intercept_errors on;
        }

        location /services/ {
            proxy_pass http://launcher:8090/services/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location /auth/ {
            proxy_pass http://launcher:8090/auth/;
            proxy_set_header Host $host;
        }

        location /admin/n8n/ {
            proxy_pass http://launcher:8090/admin/n8n/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location @launcher {
            proxy_pass http://launcher:8090;
            proxy_set_header Host $host;
        }
    }

    # ======================
    # chat.soylideria.com → LibreChat
    # ======================
    server {
        listen 443 ssl;
        server_name chat.soylideria.com;

        error_page 502 503 504 = @launcher;

        location / {
            set $backend "librechat:3080";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_intercept_errors on;
        }

        location /services/ {
            proxy_pass http://launcher:8090/services/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location /auth/ {
            proxy_pass http://launcher:8090/auth/;
            proxy_set_header Host $host;
        }

        location /admin/librechat/ {
            proxy_pass http://launcher:8090/admin/librechat/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location @launcher {
            proxy_pass http://launcher:8090;
            proxy_set_header Host $host;
        }
    }

    # ======================
    # marimo.soylideria.com → Marimo
    # ======================
    server {
        listen 443 ssl;
        server_name marimo.soylideria.com;

        error_page 401 = @auth_login;
        error_page 502 503 504 = @launcher;

        location / {
            auth_request /_marimo_auth;

            set $backend "marimo:8080";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_intercept_errors on;
        }

        location = /_marimo_auth {
            internal;
            proxy_pass http://launcher:8090/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        location /auth/ {
            proxy_pass http://launcher:8090/auth/;
            proxy_set_header Host $host;
        }

        location @auth_login {
            return 302 /auth/login;
        }

        location /services/ {
            proxy_pass http://launcher:8090/services/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location @launcher {
            proxy_pass http://launcher:8090;
            proxy_set_header Host $host;
        }
    }

    # ======================
    # bolttest.soylideria.com → Bolt.diy
    # ======================
    server {
        listen 443 ssl;
        server_name bolttest.soylideria.com;

        # Auth: redirige al login si no hay sesión válida
        error_page 401 = @auth_login;

        location / {
            # Verifica sesión antes de cada request
            auth_request /_bolt_auth;

            set $backend "bolt:5173";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_intercept_errors on;

            # WebContainers requiere HTTPS + require-corp para crossOriginIsolated=true
            proxy_hide_header Cross-Origin-Opener-Policy;
            proxy_hide_header Cross-Origin-Embedder-Policy;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }

        # Subrequest interno: pregunta al launcher si la cookie es válida
        location = /_bolt_auth {
            internal;
            proxy_pass http://launcher:8090/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # Páginas de login servidas por el launcher (sin auth_request)
        location /auth/ {
            proxy_pass http://launcher:8090/auth/;
            proxy_set_header Host $host;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }

        # Redirige a login cuando auth_request devuelve 401
        location @auth_login {
            return 302 /auth/login;
        }

        location /services/ {
            proxy_pass http://launcher:8090/services/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }

        # La página de espera también lleva los headers para que el SW se registre
        # en contexto aislado desde el primer momento
        location @launcher {
            proxy_pass http://launcher:8090;
            proxy_set_header Host $host;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }
    }

    # ======================
    # Acceso por IP (default) — solo HTTP, muestra página de índice
    # ======================
    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

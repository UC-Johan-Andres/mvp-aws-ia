worker_processes auto;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=16k;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Resolver DNS interno de Docker — permite arrancar nginx aunque algún upstream esté caído
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ======================
    # n8ntest.soylideria.com → n8n
    # ======================

    server {
        listen 80;
        server_name n8ntest.soylideria.com;

        error_page 502 503 504 = @launcher;

        location / {
            set $backend "n8n:5678";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_intercept_errors on;
        }

        location @launcher {
            proxy_pass http://launcher:8090;
            proxy_set_header Host $host;
        }
    }

    # ======================
    # chatwoot.soylideria.com → Chatwoot
    # ======================

    server {
        listen 80;
        server_name chatwoottest.soylideria.com;

        error_page 502 503 504 = @launcher;

        location / {
            set $backend "chatwoot:3000";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_intercept_errors on;
        }

        location @launcher {
            proxy_pass http://launcher:8090;

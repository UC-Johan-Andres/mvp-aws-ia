<div class="card-body">
    <h4 class="section-title">USUARIOS</h4>

    <div id="loading-spinner" class="loading-spinner">
        <div class="spinner"></div>
        <span>Cargando usuarios...</span>
    </div>

    <div id="users-table">
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
            </tbody>
        </table>
    </div>

    <div class="form-section">
        <h4 class="section-title">CREAR USUARIO(S)</h4>

        <div class="toggle-group">
            <label class="toggle-label">
                <input type="radio" name="method" value="form" checked
                       onclick="toggleMethod('form')">
                Formulario
            </label>
            <label class="toggle-label">
                <input type="radio" name="method" value="csv"
                       onclick="toggleMethod('csv')">
                CSV
            </label>
        </div>

        <form id="form-method">
            <div class="dynamic-form {{.Tab}}-form">
                <div class="rows-container">
                    {{if eq .Tab "n8n"}}
                    <div class="form-row">
                        <input type="email" name="email" placeholder="email@ejemplo.com" required>
                        <select name="role">
                            <option value="global:member">global:member</option>
                            <option value="global:admin">global:admin</option>
                        </select>
                        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
                    </div>
                    {{else}}
                    <div class="form-row">
                        <input type="email" name="email" placeholder="email@ejemplo.com" required>
                        <input type="text" name="name" placeholder="Nombre">
                        <input type="password" name="password" placeholder="Contraseña" required>
                        <select name="role">
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
                    </div>
                    {{end}}
                </div>
                <button type="button" class="btn-add-row" onclick="addRow()">+ Agregar fila</button>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="resetForm()">Cancelar</button>
                <button type="button" class="btn-submit" onclick="submitForm()">Crear Usuario(s)</button>
            </div>
        </form>

        <form id="csv-method" class="csv-zone">
            <p>Arrastra un archivo CSV aqui o selecciona:</p>
            <input type="file" id="csv-file" accept=".csv" onchange="handleCSVUpload(this)">
            <div id="csv-preview" class="csv-preview" style="display:none;"></div>
            <input type="hidden" name="csv_data" id="csv-data">
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="resetCSVForm()">Cancelar</button>
                <button type="button" class="btn-submit" onclick="submitCSVForm()">Crear Usuario(s)</button>
            </div>
        </form>
    </div>
</div>

<script>
    function addRow() {
        const form = document.querySelector('.dynamic-form');
        const isN8N = form.classList.contains('n8n-form');

        const row = document.createElement('div');
        row.className = 'form-row';

        if (isN8N) {
            row.innerHTML = `
                <input type="email" name="email" placeholder="email@ejemplo.com" required>
                <select name="role">
                    <option value="global:member">global:member</option>
                    <option value="global:admin">global:admin</option>
                </select>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
            `;
        } else {
            row.innerHTML = `
                <input type="email" name="email" placeholder="email@ejemplo.com" required>
                <input type="text" name="name" placeholder="Nombre">
                <input type="password" name="password" placeholder="Contraseña" required>
                <select name="role">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
            `;
        }
        form.querySelector('.rows-container').appendChild(row);
    }

    function toggleMethod(method) {
        const formMethod = method === 'form';
        document.getElementById('form-method').style.display = formMethod ? 'block' : 'none';
        document.getElementById('csv-method').className = formMethod ? '' : 'csv-zone active';
    }

    function handleCSVUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const lines = content.trim().split('\n');
            const count = lines.length - 1;
            document.getElementById('csv-preview').textContent = count + ' usuario(s) detectado(s)';
            document.getElementById('csv-data').value = content;
        };
        reader.readAsText(file);
    }

    function submitForm() {
        const rows = document.querySelectorAll('.rows-container .form-row');
        const users = [];
        const tab = '{{.Tab}}';
        
        rows.forEach(row => {
            const email = row.querySelector('input[name="email"]').value.trim();
            const role = row.querySelector('select[name="role"]').value;
            
            if (!email) return;
            
            if (tab === 'n8n') {
                users.push({ email, role });
            } else {
                const name = row.querySelector('input[name="name"]').value.trim();
                const password = row.querySelector('input[name="password"]').value;
                users.push({ email, name, password, role });
            }
        });
        
        if (users.length === 0) {
            showToast('Ingresa al menos un email válido', 'error');
            return;
        }
        
        createUsers(users);
    }

    function submitCSVForm() {
        const csvData = document.getElementById('csv-data').value;
        if (!csvData) {
            showToast('Selecciona un archivo CSV', 'error');
            return;
        }

        const tab = '{{.Tab}}';
        const lines = csvData.trim().split('\n');
        const users = [];

        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',').map(c => c.trim());
            if (!cols[0]) continue;
            
            if (tab === 'n8n') {
                users.push({ email: cols[0], role: cols[1] || 'global:member' });
            } else {
                users.push({ 
                    email: cols[0], 
                    name: cols[1] || '', 
                    password: cols[2] || cols[1] || '', 
                    role: cols[3] || 'USER' 
                });
            }
        }

        if (users.length === 0) {
            showToast('No se detectaron usuarios en el CSV', 'error');
            return;
        }

        createUsers(users);
    }

    function resetForm() {
        const radio = document.querySelector('input[name="method"][value="form"]');
        if (radio) radio.checked = true;
        toggleMethod('form');
        document.getElementById('csv-preview').style.display = 'none';
        document.getElementById('csv-data').value = '';

        const form = document.getElementById('form-method');
        const rowsContainer = form.querySelector('.rows-container');
        rowsContainer.innerHTML = '';

        if ('{{.Tab}}' === 'n8n') {
            rowsContainer.innerHTML = `
                <div class="form-row">
                    <input type="email" name="email" placeholder="email@ejemplo.com" required>
                    <select name="role">
                        <option value="global:member">global:member</option>
                        <option value="global:admin">global:admin</option>
                    </select>
                    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
                </div>
            `;
        } else {
            rowsContainer.innerHTML = `
                <div class="form-row">
                    <input type="email" name="email" placeholder="email@ejemplo.com" required>
                    <input type="text" name="name" placeholder="Nombre">
                    <input type="password" name="password" placeholder="Contraseña" required>
                    <select name="role">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
                </div>
            `;
        }
    }

    function resetCsvForm() {
        document.getElementById('csv-file').value = '';
        document.getElementById('csv-preview').style.display = 'none';
        document.getElementById('csv-preview').textContent = '';
        document.getElementById('csv-data').value = '';
    }
</script>

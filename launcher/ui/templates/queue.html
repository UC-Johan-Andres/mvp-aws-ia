<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>En cola — {{.Service}}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 48px 64px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        .icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 8px; }
        .subtitle { color: #6c757d; font-size: 0.9rem; margin-bottom: 32px; }
        .service-name { color: #007bff; font-weight: 600; }
        .position-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 28px;
        }

        /* Queue status block — swapped by HTMX */
        #queue-status {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px 24px;
            text-align: left;
        }
        #queue-status h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6c757d;
            margin-bottom: 12px;
        }
        .svc-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f3f5;
        }
        .svc-row:last-child { border-bottom: none; }
        .svc-info { display: flex; align-items: center; gap: 10px; }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #28a745;
            flex-shrink: 0;
        }
        .dot.starting { background: #ffc107; }
        .svc-label { font-size: 0.95rem; color: #212529; font-weight: 500; }
        .btn-stop {
            padding: 5px 14px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-stop:hover { background: #b02a37; }
        .empty-msg { color: #6c757d; font-size: 0.9rem; font-style: italic; }

        .slots-info {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #6c757d;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#x23F3;</div>
        <h2>Slot lleno</h2>
        <p class="subtitle">
            <span class="service-name">{{.Service}}</span> está esperando un slot disponible.
        </p>
        <div class="position-badge">Posición {{.Position}} en la cola</div>

        <!-- Cuando nuestro servicio arranque, redirigir automáticamente -->
        <div hx-get="/services/{{.Service}}/ready"
             hx-trigger="every 4s"
             hx-swap="none"></div>

        <!-- HTMX polling block: every 3s fetch updated fragment -->
        <div
            id="queue-status"
            hx-get="/services/queue-status"
            hx-trigger="every 3s"
            hx-swap="outerHTML">

            <h3>Servicios activos</h3>
            {{if .Status.Running}}
                {{range .Status.Running}}
                <div class="svc-row">
                    <div class="svc-info">
                        <div class="dot"></div>
                        <span class="svc-label">{{.}}</span>
                    </div>
                    <button
                        class="btn-stop"
                        hx-post="/services/{{.}}/stop"
                        hx-target="#queue-status"
                        hx-swap="outerHTML"
                        hx-confirm="¿Detener {{.}}?">
                        Detener
                    </button>
                </div>
                {{end}}
            {{else}}
                <p class="empty-msg">Ningún servicio activo.</p>
            {{end}}

            <div class="slots-info">
                {{len .Status.Running}} / {{.Status.MaxServices}} slots ocupados
            </div>
        </div>
    </div>
</body>
</html>

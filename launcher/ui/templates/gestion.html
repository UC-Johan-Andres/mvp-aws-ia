<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
        function resolveTheme() {
            var m = localStorage.getItem('gestion-color-mode');
            if (m === 'light') return 'light';
            if (m === 'dark') return 'dark';
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolveTheme());
    })();
    </script>
    <title>Gestión de Usuarios — AI Ecosystem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4" integrity="sha384-A986SAtodyH8eg8x8irJnYUk7i9inVQqYigD6qZ9evobksGNIXfeFvDwLSHcp31N" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --body-bg: linear-gradient(160deg, #f0f4f8 0%, #eef2ff 50%, #f8fafc 100%);
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --border: rgba(15, 23, 42, 0.08);
            --text: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-soft: rgba(37, 99, 235, 0.1);
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --success: #059669;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06);
            --shadow: 0 4px 24px rgba(15, 23, 42, 0.07);
            --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.1);
            --font: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --chart-tick: #64748b;
            --chart-grid: rgba(148, 163, 184, 0.25);
            --tab-hover-bg: rgba(255, 255, 255, 0.7);
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --body-bg: linear-gradient(165deg, #0f172a 0%, #1e1b4b 45%, #0f172a 100%);
            --surface: #1e293b;
            --surface-muted: #334155;
            --border: rgba(148, 163, 184, 0.12);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #60a5fa;
            --primary-hover: #93c5fd;
            --primary-soft: rgba(96, 165, 250, 0.18);
            --danger: #f87171;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.45);
            --chart-tick: #94a3b8;
            --chart-grid: rgba(148, 163, 184, 0.12);
            --tab-hover-bg: rgba(255, 255, 255, 0.06);
            color-scheme: dark;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--body-bg);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            transition: background 0.35s ease, color 0.2s ease;
        }
        .container {
            max-width: min(1140px, 100%);
            margin: 0 auto;
            padding: clamp(16px, 4vw, 32px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .brand-mark {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 55%, #db2777 100%);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
            flex-shrink: 0;
        }
        .header-titles h1 {
            font-size: clamp(1.35rem, 2.5vw, 1.65rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            line-height: 1.2;
        }
        .header-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
            max-width: 36ch;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-theme {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .btn-theme:hover {
            color: var(--text);
            border-color: rgba(37, 99, 235, 0.35);
        }
        [data-theme="dark"] .btn-theme:hover {
            border-color: rgba(96, 165, 250, 0.4);
        }
        .btn-theme:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        .btn-theme-icon {
            font-size: 1rem;
            line-height: 1;
        }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .user-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(180deg, #34d399, #059669);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
        }
        .btn-logout {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            color: var(--danger);
            border: 1px solid rgba(220, 38, 38, 0.25);
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }
        .btn-logout:hover {
            background: rgba(220, 38, 38, 0.06);
            border-color: rgba(220, 38, 38, 0.45);
        }
        .btn-logout:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .card-elevated {
            box-shadow: var(--shadow-lg);
        }
        .tabs {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            background: var(--surface-muted);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .tab {
            display: inline-flex;
            align-items: center;
            padding: 10px 18px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 999px;
            transition: color 0.2s, background 0.2s, box-shadow 0.2s;
            flex: 0 0 auto;
            white-space: nowrap;
        }
        .tab-icon {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .tab-icon-n8n {
            background: linear-gradient(135deg, #f43f5e, #fb923c);
        }
        .tab-icon-chat {
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
        }
        .tab-icon-chart {
            background: linear-gradient(135deg, #059669, #14b8a6);
        }
        .tab:hover {
            color: var(--text);
            background: var(--tab-hover-bg);
        }
        .tab.active {
            color: var(--primary);
            background: var(--surface);
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
        }
        .tab:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .card-body {
            padding: clamp(20px, 3vw, 28px);
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: "";
            width: 4px;
            height: 1.1em;
            border-radius: 4px;
            background: linear-gradient(180deg, #2563eb, #7c3aed);
            flex-shrink: 0;
        }
        .panel-muted {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.55;
            margin-bottom: 18px;
        }
        .panel-muted code {
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 6px;
            background: var(--surface-muted);
            border: 1px solid var(--border);
        }

        .table-responsive-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 24px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
        }
        .table-responsive-wrap .data-table {
            margin-bottom: 0;
            min-width: 680px;
        }
        table.data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #fafbfc 0%, #f1f5f9 100%);
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .data-table td {
            padding: 13px 16px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
            font-size: 0.9rem;
            vertical-align: middle;
        }
        .data-table tbody tr:nth-child(even) { background: rgba(248, 250, 252, 0.8); }
        .data-table tbody tr:hover { background: rgba(37, 99, 235, 0.05); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table th.col-num, .data-table td.col-num {
            text-align: right;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .data-table .btn-small { margin: 2px 4px 2px 0; }
        .role-badge {
            display: inline-block;
            padding: 4px 11px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .role-admin { background: rgba(5, 150, 105, 0.12); color: #047857; }
        .role-user { background: rgba(37, 99, 235, 0.1); color: #1d4ed8; }
        .role-member { background: rgba(37, 99, 235, 0.1); color: #1d4ed8; }
        .role-owner { background: rgba(245, 158, 11, 0.15); color: #b45309; }
        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, filter 0.15s;
        }
        .btn-small:active { transform: scale(0.97); }
        .btn-invite {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
        }
        .btn-invite:hover { filter: brightness(1.06); }
        .btn-edit {
            background: linear-gradient(135deg, #059669, #0d9488);
            color: white;
            margin-right: 6px;
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.3);
        }
        .btn-edit:hover { filter: brightness(1.06); }
        .btn-delete {
            background: var(--surface);
            color: var(--danger);
            border: 1px solid rgba(220, 38, 38, 0.35);
        }
        .btn-delete:hover { background: rgba(220, 38, 38, 0.08); }
        .btn-delete:disabled {
            background: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }
        .empty-state p { margin-bottom: 8px; font-size: 0.95rem; }
        .empty-state p:first-child { font-weight: 600; color: var(--text); }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
            color: #6c757d;
        }
        .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-section {
            border-top: 1px solid var(--border);
            padding-top: 28px;
            margin-top: 28px;
        }

        .toggle-group {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .toggle-label input[type="radio"] {
            width: 16px;
            height: 16px;
        }

        .dynamic-form { margin-bottom: 16px; }
        .form-hint {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.55;
            padding: 12px 14px;
            background: var(--surface-muted);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .form-hint strong { color: var(--text); }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .n8n-form .form-row input[type="email"] {
            flex: 1 1 220px;
            min-width: 0;
        }
        .librechat-form .form-row input[type="email"] {
            flex: 1 1 200px;
            min-width: 0;
        }
        .librechat-form .form-row input[type="text"],
        .librechat-form .form-row input[type="password"] {
            flex: 1 1 160px;
            min-width: 140px;
        }
        .form-row input, .form-row select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--surface);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        .btn-remove {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(220, 38, 38, 0.08);
            color: var(--danger);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.25rem;
            line-height: 1;
            transition: background 0.2s;
        }
        .btn-remove:hover { background: rgba(220, 38, 38, 0.16); }

        .btn-add-row {
            background: transparent;
            border: 2px dashed rgba(37, 99, 235, 0.25);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            margin-bottom: 20px;
            transition: border-color 0.2s, background 0.2s;
        }
        .btn-add-row:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .csv-zone {
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .csv-zone.active { display: block; }
        .csv-zone input[type="file"] {
            margin-top: 12px;
        }
        .csv-preview {
            margin-top: 12px;
            padding: 12px;
            background: #e9ecef;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #495057;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-cancel {
            padding: 10px 22px;
            background: var(--surface-muted);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: #e2e8f0; }
        .btn-submit {
            padding: 10px 26px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
            transition: filter 0.2s, transform 0.15s;
        }
        .btn-submit:hover { filter: brightness(1.05); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; filter: none; }

        .user-form { display: none; }
        .user-form.active { display: block; }

        #toasts {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }
        .toast {
            background: var(--surface);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            margin-top: 10px;
            animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            max-width: 360px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid var(--border);
        }
        .toast.success {
            border-left: 4px solid var(--success);
        }
        .toast.error {
            border-left: 4px solid var(--danger);
        }
        .error-banner {
            background: rgba(220, 38, 38, 0.08);
            color: #991b1b;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            margin-bottom: 18px;
            border: 1px solid rgba(220, 38, 38, 0.2);
            font-size: 0.9rem;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #invite-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }
        #invite-modal.active { display: flex; }
        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: clamp(24px, 4vw, 36px);
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            animation: modalIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-content h3 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 16px;
        }
        .modal-content p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .invite-link-box {
            background: var(--surface-muted);
            padding: 12px;
            border-radius: 6px;
            font-family: ui-monospace, monospace;
            font-size: 0.85rem;
            word-break: break-all;
            margin: 12px 0;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-close {
            padding: 10px 20px;
            background: var(--surface-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: background 0.2s;
        }
        .modal-close:hover { background: rgba(148, 163, 184, 0.2); }
        [data-theme="light"] .modal-close:hover { background: #e2e8f0; }
        .modal-copy {
            padding: 10px 20px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }

        .footer-status {
            margin-top: 28px;
            padding: 14px 20px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: linear-gradient(180deg, #34d399, #059669);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
            animation: pulse-dot 2.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }

        #edit-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }
        #edit-modal.active { display: flex; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-muted);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
        .input-readonly {
            background: var(--surface-muted) !important;
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .modal-save {
            padding: 10px 22px;
            background: linear-gradient(135deg, #059669, #0d9488);
            color: white;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.35);
        }
        .modal-save:hover { filter: brightness(1.06); }

        /* Módulo estadísticas / gráficos */
        .charts-root {
            padding: 8px 4px 4px;
            max-width: 920px;
            margin: 0 auto;
        }
        .charts-root .chart-section {
            margin-bottom: 40px;
        }
        .charts-root .chart-section:last-child { margin-bottom: 0; }
        .chart-section-header {
            text-align: center;
            max-width: 38rem;
            margin: 0 auto 28px;
            padding: 0 12px;
        }
        .chart-heading {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .chart-heading::after {
            content: "";
            display: block;
            width: 48px;
            height: 3px;
            margin: 16px auto 0;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--primary), #a855f7);
        }
        .chart-lede {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.65;
            margin: 0 auto;
            max-width: 36rem;
        }
        .chart-lede code {
            font-size: 0.82em;
            padding: 2px 7px;
            border-radius: 6px;
            background: var(--surface-muted);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .stats-kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin: 0 auto 24px;
            max-width: 52rem;
            justify-content: center;
        }
        .stats-kpi {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            text-align: center;
        }
        .stats-kpi .kpi-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 6px;
        }
        .stats-kpi .kpi-value {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 100%;
            margin: 0 auto;
        }
        .chart-card {
            background: linear-gradient(180deg, var(--surface) 0%, var(--surface-muted) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 18px;
            min-height: 268px;
            transition: box-shadow 0.25s, transform 0.2s;
        }
        .chart-card:hover {
            box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
        }
        [data-theme="dark"] .chart-card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }
        .chart-card h4 {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: -0.01em;
            text-align: center;
        }
        .chart-card canvas { max-height: 220px; }
        .lc-stats-hint {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(251, 191, 36, 0.08));
            border: 1px solid rgba(245, 158, 11, 0.35);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            font-size: 0.9rem;
            color: #92400e;
            font-weight: 500;
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header-actions { width: 100%; justify-content: flex-end; }
            .card-body { padding: 16px; }
            .chart-grid { grid-template-columns: 1fr; }
            .stats-kpi-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div hx-ext="sse" sse-connect="/gestion/stream" sse-swap="init,users_updated" id="sse-container"></div>
    <div class="container" id="app-container">
        <header class="header">
            <div class="header-brand">
                <div class="brand-mark" aria-hidden="true"></div>
                <div class="header-titles">
                    <h1>Gestión de usuarios</h1>
                    <p class="header-subtitle">n8n, LibreChat y estadísticas en un solo lugar</p>
                </div>
            </div>
            <div class="header-actions">
                <button type="button" class="btn-theme" id="theme-cycle" title="Cambiar tema" aria-label="Tema: automático, claro u oscuro">
                    <span class="btn-theme-icon" id="theme-cycle-icon" aria-hidden="true">◐</span>
                    <span id="theme-cycle-label">Auto</span>
                </button>
                <span class="user-badge"><span class="user-badge-dot" aria-hidden="true"></span> admin</span>
                <a href="/auth/logout" class="btn-logout">Cerrar sesión</a>
            </div>
        </header>

        <div class="card card-elevated">
            <div class="tabs" role="tablist" aria-label="Secciones">
                <button type="button" class="tab active" data-tab="n8n" onclick="switchTab('n8n')" role="tab" aria-selected="true">
                    <span class="tab-icon tab-icon-n8n" aria-hidden="true"></span>
                    n8n
                </button>
                <button type="button" class="tab" data-tab="librechat" onclick="switchTab('librechat')" role="tab" aria-selected="false">
                    <span class="tab-icon tab-icon-chat" aria-hidden="true"></span>
                    LibreChat
                </button>
                <button type="button" class="tab" data-tab="estadisticas" onclick="switchTab('estadisticas')" role="tab" aria-selected="false">
                    <span class="tab-icon tab-icon-chart" aria-hidden="true"></span>
                    Estadísticas
                </button>
            </div>

            <div id="main-content" hx-get="/gestion/content?tab=n8n" hx-trigger="load" hx-swap="innerHTML">
            </div>
        </div>

        <div class="footer-status">
            <span class="status-dot"></span>
            <span id="footer-service">Conectado a n8n</span>
        </div>
    </div>

    <div id="toasts"></div>

    <div id="invite-modal">
        <div class="modal-content">
            <h3>Invitación pendiente</h3>
            <p>El usuario debe revisar su correo. Si no recibe el email, usa este enlace directo:</p>
            <div id="invite-link-box" class="invite-link-box"></div>
            <div class="modal-actions">
                <button class="modal-close" onclick="closeInviteModal()">Cerrar</button>
                <button class="modal-copy" onclick="copyInviteLink()">Copiar enlace</button>
            </div>
        </div>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <h3>Editar Usuario</h3>
            <input type="hidden" id="edit-user-id">
            <input type="hidden" id="edit-user-tab">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="edit-user-email" class="input-readonly" readonly>
            </div>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="edit-user-name">
            </div>
            <div class="form-group">
                <label>Rol</label>
                <select id="edit-user-role">
                    <!-- Opciones se llenan dinámicamente -->
                </select>
            </div>
            <div class="modal-actions">
                <button class="modal-close" onclick="closeEditModal()">Cancelar</button>
                <button class="modal-save" onclick="saveUser()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let currentInviteLink = '';
        let currentTab = 'n8n';
        let isInitialized = false;

        var THEME_MODE_KEY = 'gestion-color-mode';
        var THEME_MODES = ['system', 'light', 'dark'];

        function resolveDataTheme() {
            var m = localStorage.getItem(THEME_MODE_KEY) || 'system';
            if (m === 'light') return 'light';
            if (m === 'dark') return 'dark';
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyResolvedTheme() {
            document.documentElement.setAttribute('data-theme', resolveDataTheme());
        }

        function syncThemeButton() {
            var mode = localStorage.getItem(THEME_MODE_KEY) || 'system';
            var icon = document.getElementById('theme-cycle-icon');
            var label = document.getElementById('theme-cycle-label');
            if (!icon || !label) return;
            if (mode === 'system') {
                icon.textContent = '\u25D0';
                label.textContent = 'Auto';
            } else if (mode === 'light') {
                icon.textContent = '\u2600';
                label.textContent = 'Claro';
            } else {
                icon.textContent = '\u263E';
                label.textContent = 'Oscuro';
            }
        }

        function cycleThemeMode() {
            var cur = localStorage.getItem(THEME_MODE_KEY) || 'system';
            var i = THEME_MODES.indexOf(cur);
            if (i < 0) i = 0;
            localStorage.setItem(THEME_MODE_KEY, THEME_MODES[(i + 1) % THEME_MODES.length]);
            applyResolvedTheme();
            syncThemeButton();
            window.dispatchEvent(new CustomEvent('gestion-theme-change'));
        }

        // Funciones para localStorage
        function getCachedUsers() {
            const stored = localStorage.getItem('gestionUsers');
            return stored ? JSON.parse(stored) : { n8n: [], librechat: [] };
        }

        function setCachedUsers(data) {
            localStorage.setItem('gestionUsers', JSON.stringify(data));
        }

        function updateLocalStorageFromResponse(tab, responseData) {
            const data = getCachedUsers();
            if (responseData && responseData.email) {
                const exists = data[tab].find(u => u.email === responseData.email);
                if (!exists) {
                    data[tab].push(responseData);
                }
            }
            setCachedUsers(data);
            renderUsersFromCache(tab);
        }

        function removeFromLocalStorage(tab, email) {
            const data = getCachedUsers();
            data[tab] = data[tab].filter(u => u.email !== email);
            setCachedUsers(data);
            renderUsersFromCache(tab);
        }

        function updateUserInLocalStorage(tab, updatedUser) {
            const data = getCachedUsers();
            const index = data[tab].findIndex(u => u.email === updatedUser.email);
            if (index !== -1) {
                data[tab][index] = { ...data[tab][index], ...updatedUser };
            }
            setCachedUsers(data);
            renderUsersFromCache(tab);
        }

        // Inicializar formulario activo al cargar
        document.addEventListener('DOMContentLoaded', function() {
            applyResolvedTheme();
            syncThemeButton();
            var tbtn = document.getElementById('theme-cycle');
            if (tbtn) tbtn.addEventListener('click', cycleThemeMode);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
                if ((localStorage.getItem(THEME_MODE_KEY) || 'system') !== 'system') return;
                applyResolvedTheme();
                syncThemeButton();
                window.dispatchEvent(new CustomEvent('gestion-theme-change'));
            });

            const formN8n = document.getElementById('form-n8n');
            const formLibrechat = document.getElementById('form-librechat');
            if (formN8n && formLibrechat) {
                formN8n.classList.add('active');
                formLibrechat.classList.remove('active');
            }

            const cached = getCachedUsers();
            if (cached.n8n.length > 0 || cached.librechat.length > 0) {
                isInitialized = true;
                renderUsersFromCache(currentTab);
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
                t.setAttribute('aria-selected', 'false');
            });
            const tabBtn = document.querySelector(`[data-tab="${tab}"]`);
            if (tabBtn) {
                tabBtn.classList.add('active');
                tabBtn.setAttribute('aria-selected', 'true');
            }
            currentTab = tab;

            const footer = document.getElementById('footer-service');
            if (tab === 'estadisticas') {
                footer.textContent = 'Vista de estadísticas agregadas';
                htmx.ajax('GET', '/gestion/charts-content', { target: '#main-content', swap: 'innerHTML' });
                return;
            }
            footer.textContent = 'Conectado a ' + (tab === 'n8n' ? 'n8n' : 'LibreChat');
            htmx.ajax('GET', '/gestion/content?tab=' + encodeURIComponent(tab), { target: '#main-content', swap: 'innerHTML' });
        }

        function syncGestionUserFormsAfterContentLoad() {
            if (!document.getElementById('form-n8n')) {
                return;
            }
            document.querySelectorAll('.user-form').forEach(f => f.classList.remove('active'));
            const form = document.getElementById('form-' + currentTab);
            if (form) {
                form.classList.add('active');
            }
            updateUsersTableHeader(currentTab);
        }

        function destroyGestionCharts() {
            if (!window.__gestionCharts) {
                return;
            }
            window.__gestionCharts.forEach(function(ch) {
                try { ch.destroy(); } catch (e) {}
            });
            window.__gestionCharts = [];
        }

        function shortChartLabel(s, maxLen) {
            if (!s) return '';
            var t = String(s).trim();
            if (t.length <= maxLen) return t;
            return t.slice(0, maxLen - 1) + '…';
        }

        function initGestionChartsPage() {
            destroyGestionCharts();
            window.__gestionCharts = [];

            var errEl = document.getElementById('n8n-stats-error');
            var bodyEl = document.getElementById('n8n-stats-body');
            var lcErr = document.getElementById('lc-stats-error');
            var lcBody = document.getElementById('lc-stats-body');
            var lcMsg = document.getElementById('lc-stats-message');

            function setKpi(id, val) {
                var el = document.getElementById(id);
                if (el) el.textContent = val;
            }

            if (typeof Chart === 'undefined') {
                if (errEl) {
                    errEl.style.display = 'block';
                    errEl.textContent = 'Chart.js no está cargado.';
                }
                if (lcErr) {
                    lcErr.style.display = 'block';
                    lcErr.textContent = 'Chart.js no está cargado.';
                }
                return;
            }

            fetch('/gestion/api/stats', { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var commonOpts = {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    };
                    var st = getComputedStyle(document.documentElement);
                    var tickC = (st.getPropertyValue('--chart-tick').trim() || '#64748b');
                    var gridC = (st.getPropertyValue('--chart-grid').trim() || 'rgba(148,163,184,0.2)');
                    function chartSx() {
                        return {
                            ticks: { maxRotation: 45, minRotation: 0, font: { size: 10 }, color: tickC },
                            grid: { color: gridC }
                        };
                    }
                    function chartSyNum() {
                        return {
                            beginAtZero: true,
                            ticks: { precision: 0, color: tickC },
                            grid: { color: gridC }
                        };
                    }
                    function chartSyPct() {
                        return {
                            beginAtZero: true,
                            suggestedMax: 100,
                            ticks: {
                                color: tickC,
                                callback: function(v) { return v + '%'; }
                            },
                            grid: { color: gridC }
                        };
                    }

                    var n8n = data.n8n || {};
                    if (!n8n.available) {
                        if (bodyEl) bodyEl.style.display = 'none';
                        if (errEl) {
                            errEl.style.display = 'block';
                            errEl.textContent = n8n.error || 'No hay datos de n8n.';
                        }
                    } else {
                        if (errEl) errEl.style.display = 'none';
                        if (bodyEl) bodyEl.style.display = 'block';

                        var nu = n8n.users || [];
                        var nlabels = nu.map(function(u) { return shortChartLabel(u.email, 22); });
                        var execData = nu.map(function(u) { return Number(u.prodExecutions) || 0; });
                        var wfData = nu.map(function(u) { return Number(u.workflowsAccesibles) || 0; });
                        var failRate = nu.map(function(u) { return Number(u.failureRatePct) || 0; });

                        var elExec = document.getElementById('chart-n8n-exec');
                        if (elExec && nlabels.length) {
                            window.__gestionCharts.push(new Chart(elExec, {
                                type: 'bar',
                                data: {
                                    labels: nlabels,
                                    datasets: [{
                                        label: 'Ejecuciones (no manual)',
                                        data: execData,
                                        backgroundColor: 'rgba(0, 123, 255, 0.55)',
                                        borderColor: 'rgba(0, 86, 179, 0.9)',
                                        borderWidth: 1
                                    }]
                                },
                                options: Object.assign({}, commonOpts, {
                                    scales: {
                                        x: chartSx(),
                                        y: chartSyNum()
                                    }
                                })
                            }));
                        }

                        var elWf = document.getElementById('chart-n8n-workflows');
                        if (elWf && nlabels.length) {
                            window.__gestionCharts.push(new Chart(elWf, {
                                type: 'bar',
                                data: {
                                    labels: nlabels,
                                    datasets: [{
                                        label: 'Workflows accesibles',
                                        data: wfData,
                                        backgroundColor: 'rgba(40, 167, 69, 0.5)',
                                        borderColor: 'rgba(25, 135, 84, 0.95)',
                                        borderWidth: 1
                                    }]
                                },
                                options: Object.assign({}, commonOpts, {
                                    scales: {
                                        x: chartSx(),
                                        y: chartSyNum()
                                    }
                                })
                            }));
                        }

                        var elFr = document.getElementById('chart-n8n-failrate');
                        if (elFr && nlabels.length) {
                            window.__gestionCharts.push(new Chart(elFr, {
                                type: 'bar',
                                data: {
                                    labels: nlabels,
                                    datasets: [{
                                        label: '% fallos (prod)',
                                        data: failRate,
                                        backgroundColor: 'rgba(220, 53, 69, 0.45)',
                                        borderColor: 'rgba(176, 42, 55, 0.9)',
                                        borderWidth: 1
                                    }]
                                },
                                options: Object.assign({}, commonOpts, {
                                    scales: {
                                        x: chartSx(),
                                        y: chartSyPct()
                                    }
                                })
                            }));
                        }
                    }

                    var lc = data.librechat || {};
                    if (!lc.available) {
                        if (lcBody) lcBody.style.display = 'none';
                        if (lcMsg) lcMsg.style.display = 'none';
                        if (lcErr) {
                            lcErr.style.display = 'block';
                            lcErr.textContent = lc.error || lc.message || 'LibreChat: sin conexión a MongoDB.';
                        }
                    } else {
                        if (lcErr) lcErr.style.display = 'none';
                        if (lc.message) {
                            if (lcMsg) {
                                lcMsg.style.display = 'block';
                                lcMsg.textContent = lc.message;
                            }
                        } else if (lcMsg) {
                            lcMsg.style.display = 'none';
                        }
                        if (lcBody) lcBody.style.display = 'block';
                        var lt = lc.totals || {};
                        setKpi('kpi-lc-users', String(lt.usersWithActivity != null ? lt.usersWithActivity : '0'));
                        setKpi('kpi-lc-conv', String(lt.totalConversations != null ? lt.totalConversations : '0'));
                        setKpi('kpi-lc-msg', String(lt.totalMessages != null ? lt.totalMessages : '0'));

                        var lu = lc.users || [];
                        var llabels = lu.map(function(u) { return shortChartLabel(u.email || u.name || '—', 22); });
                        var convSeries = lu.map(function(u) { return Number(u.totalConversations) || 0; });
                        var msgSeries = lu.map(function(u) { return Number(u.totalMessages) || 0; });

                        var elLcC = document.getElementById('chart-lc-conv');
                        if (elLcC && llabels.length) {
                            window.__gestionCharts.push(new Chart(elLcC, {
                                type: 'bar',
                                data: {
                                    labels: llabels,
                                    datasets: [{
                                        label: 'Conversaciones',
                                        data: convSeries,
                                        backgroundColor: 'rgba(111, 66, 193, 0.5)',
                                        borderColor: 'rgba(83, 44, 168, 0.95)',
                                        borderWidth: 1
                                    }]
                                },
                                options: Object.assign({}, commonOpts, {
                                    scales: {
                                        x: chartSx(),
                                        y: chartSyNum()
                                    }
                                })
                            }));
                        }

                        var elLcM = document.getElementById('chart-lc-msg');
                        if (elLcM && llabels.length) {
                            window.__gestionCharts.push(new Chart(elLcM, {
                                type: 'bar',
                                data: {
                                    labels: llabels,
                                    datasets: [{
                                        label: 'Mensajes',
                                        data: msgSeries,
                                        backgroundColor: 'rgba(23, 162, 184, 0.5)',
                                        borderColor: 'rgba(15, 108, 121, 0.95)',
                                        borderWidth: 1
                                    }]
                                },
                                options: Object.assign({}, commonOpts, {
                                    scales: {
                                        x: chartSx(),
                                        y: chartSyNum()
                                    }
                                })
                            }));
                        }
                    }
                })
                .catch(function(e) {
                    if (bodyEl) bodyEl.style.display = 'none';
                    if (errEl) {
                        errEl.style.display = 'block';
                        errEl.textContent = 'Error al cargar estadísticas: ' + (e && e.message ? e.message : String(e));
                    }
                    if (lcBody) lcBody.style.display = 'none';
                    if (lcMsg) lcMsg.style.display = 'none';
                    if (lcErr) {
                        lcErr.style.display = 'block';
                        lcErr.textContent = 'Error al cargar estadísticas: ' + (e && e.message ? e.message : String(e));
                    }
                });
        }

        window.addEventListener('gestion-theme-change', function() {
            if (document.getElementById('gestion-charts-root')) {
                initGestionChartsPage();
            }
        });

        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (!evt.detail.target || evt.detail.target.id !== 'main-content') {
                return;
            }
            if (document.getElementById('gestion-charts-root')) {
                initGestionChartsPage();
                return;
            }
            syncGestionUserFormsAfterContentLoad();
        });

        function setActiveTab(tab) {
            // Alias para compatibilidad
            switchTab(tab);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getRoleClass(role) {
            if (role === 'ADMIN' || role === 'global:admin' || role === 'global:owner') {
                return 'role-admin';
            }
            return 'role-user';
        }

        function fmtStat(v) {
            if (v === undefined || v === null) {
                return '—';
            }
            return String(v);
        }

        function fmtFloat2(v) {
            if (v === undefined || v === null || Number.isNaN(Number(v))) {
                return '—';
            }
            return Number(v).toFixed(2);
        }

        function updateUsersTableHeader(tab) {
            const tr = document.querySelector('#users-table thead tr');
            if (!tr) {
                return;
            }
            if (tab === 'n8n') {
                tr.innerHTML = `
                    <th>Email</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th class="col-num">Workflows acc.</th>
                    <th class="col-num">Prod ejec.</th>
                    <th class="col-num">Fallidas</th>
                    <th class="col-num">% fallo</th>
                    <th class="col-num">T. medio (s)</th>
                    <th>Acciones</th>
                `;
            } else {
                tr.innerHTML = `
                    <th>Email</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                `;
            }
        }

        function generateUsersHTML(users, tab) {
            const emptyCols = tab === 'n8n' ? 9 : 4;
            if (!users || users.length === 0) {
                return `
                    <tr>
                        <td colspan="${emptyCols}" class="empty-state">
                            <p>No hay usuarios registrados.</p>
                            <p>Usa el formulario abajo para crear usuarios.</p>
                        </td>
                    </tr>
                `;
            }

            return users.map(u => {
                const name = u.firstName || u.name || '-';
                const isPending = u.isPending === true;
                const roleClass = getRoleClass(u.role);
                const userId = u.id || u.email;

                let actions = '';
                if (tab === 'n8n' && u.inviteAcceptUrl) {
                    actions += `
                        <button type="button" class="btn-small btn-invite" 
                                onclick="openInviteModalDirect('${escapeHtml(u.email)}', '${escapeHtml(u.inviteAcceptUrl)}')">
                            Invitar
                        </button>
                    `;
                }
                
                // Botón Editar solo para LibreChat
                if (tab === 'librechat') {
                    actions += `
                        <button type="button" class="btn-small btn-edit" 
                                onclick="openEditModal('${tab}', '${escapeHtml(userId)}', '${escapeHtml(u.email)}', '${escapeHtml(name)}', '${escapeHtml(u.role)}')">
                            Editar
                        </button>
                    `;
                }
                
                actions += `
                    <button type="button" class="btn-small btn-delete" 
                            data-tab="${tab}" data-id="${escapeHtml(userId)}" data-email="${escapeHtml(u.email)}"
                            onclick="deleteUser(this)">
                        Eliminar
                    </button>
                `;

                const statsCells = tab === 'n8n' ? `
                        <td class="col-num">${fmtStat(u.workflowsAccesibles)}</td>
                        <td class="col-num">${fmtStat(u.prodExecutions)}</td>
                        <td class="col-num">${fmtStat(u.failedProdExecutions)}</td>
                        <td class="col-num">${fmtFloat2(u.failureRatePct)}</td>
                        <td class="col-num">${fmtFloat2(u.runTimeAvgSeconds)}</td>
                ` : '';

                return `
                    <tr>
                        <td>${escapeHtml(u.email)}</td>
                        <td>${escapeHtml(name)}</td>
                        <td>
                            <span class="role-badge ${roleClass}">
                                ${escapeHtml(u.role)}${isPending ? ' (pendiente)' : ''}
                            </span>
                        </td>
                        ${statsCells}
                        <td>${actions}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderUsersFromCache(tab) {
            const tbody = document.getElementById('users-tbody');
            if (!tbody) {
                return;
            }

            updateUsersTableHeader(tab);
            const data = getCachedUsers();
            const users = data[tab] || [];
            tbody.innerHTML = generateUsersHTML(users, tab);
        }

        // SSE: interceptar ANTES del swap - usar localStorage
        document.body.addEventListener('htmx:sseBeforeMessage', function(evt) {
            const eventName = evt.detail.type;
            
            console.log('SSE BeforeMessage:', eventName);
            
            if (eventName === 'init' || eventName === 'users_updated') {
                try {
                    // 1. Parsear JSON del servidor
                    const data = JSON.parse(evt.detail.data);
                    
                    // 2. Guardar en localStorage
                    setCachedUsers(data);
                    
                    console.log('localStorage updated:', data);
                    
                    isInitialized = true;
                    
                    // Prevenir el swap automático de HTMX
                    evt.preventDefault();
                    
                    if (eventName === 'users_updated') {
                        showToast('Usuarios actualizados', 'success');
                    }
                    
                    // Renderizar desde localStorage
                    renderUsersFromCache(currentTab);
                } catch (e) {
                    console.error('SSE: failed to parse message', e);
                    evt.preventDefault();
                }
            }
        });

        function openInviteModalDirect(email, inviteUrl) {
            currentInviteLink = inviteUrl;
            document.getElementById('invite-link-box').textContent = inviteUrl;
            document.getElementById('invite-modal').classList.add('active');
        }

        function closeInviteModal() {
            document.getElementById('invite-modal').classList.remove('active');
        }

        function copyInviteLink() {
            navigator.clipboard.writeText(currentInviteLink).then(() => {
                showToast('Enlace copiado al portapapeles', 'success');
            }).catch(() => {
                showToast('Error al copiar', 'error');
            });
        }

        function showToast(message, type) {
            const container = document.getElementById('toasts');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function deleteUser(btn) {
            const tab = btn.dataset.tab;
            const userId = btn.dataset.id;
            const email = btn.dataset.email;

            if (!confirm('¿Estás seguro de eliminar al usuario ' + email + '?')) {
                return;
            }

            btn.disabled = true;
            btn.textContent = '...';

            const endpoint = tab === 'n8n' ? '/admin/n8n/users' : '/admin/librechat/users';
            const body = tab === 'n8n' ? JSON.stringify({ id: userId }) : JSON.stringify({ email: email });

            fetch(endpoint, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: body,
                credentials: 'same-origin'
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.error || 'Error al eliminar'); });
                }
                return response.json();
            })
            .then(data => {
                showToast('Usuario eliminado', 'success');
                removeFromLocalStorage(tab, email);
            })
            .catch(error => {
                showToast('Error: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Eliminar';
            });
        }

        function openEditModal(tab, userId, email, name, role) {
            if (tab === 'n8n') {
                showToast('Edición no disponible para n8n. Elimina y crea un nuevo usuario.', 'error');
                return;
            }
            
            document.getElementById('edit-user-id').value = userId;
            document.getElementById('edit-user-tab').value = tab;
            document.getElementById('edit-user-email').value = email;
            document.getElementById('edit-user-name').value = name;

            const roleSelect = document.getElementById('edit-user-role');
            roleSelect.innerHTML = '';

            if (tab === 'n8n') {
                roleSelect.innerHTML = `
                    <option value="global:member" ${role === 'global:member' ? 'selected' : ''}>global:member</option>
                    <option value="global:owner" ${role === 'global:owner' || role === 'global:admin' ? 'selected' : ''}>global:owner</option>
                `;
            } else {
                roleSelect.innerHTML = `
                    <option value="USER" ${role === 'USER' ? 'selected' : ''}>USER</option>
                    <option value="ADMIN" ${role === 'ADMIN' ? 'selected' : ''}>ADMIN</option>
                `;
            }

            document.getElementById('edit-modal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        function saveUser() {
            const userId = document.getElementById('edit-user-id').value;
            const tab = document.getElementById('edit-user-tab').value;
            const email = document.getElementById('edit-user-email').value;
            const name = document.getElementById('edit-user-name').value;
            const role = document.getElementById('edit-user-role').value;

            const saveBtn = document.querySelector('.modal-save');
            saveBtn.disabled = true;
            saveBtn.textContent = '...';

            const endpoint = tab === 'n8n' ? '/admin/n8n/users' : '/admin/librechat/users';
            const body = tab === 'n8n' 
                ? JSON.stringify({ id: userId, firstName: name, role: role })
                : JSON.stringify({ email: email, name: name, role: role });

            fetch(endpoint, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: body,
                credentials: 'same-origin'
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.error || 'Error al guardar'); });
                }
                return response.json();
            })
            .then(data => {
                showToast('Usuario actualizado', 'success');
                closeEditModal();
                saveBtn.disabled = false;
                saveBtn.textContent = 'Guardar';
                updateUserInLocalStorage(tab, { email: email, name: name, role: role });
            })
            .catch(error => {
                showToast('Error: ' + error.message, 'error');
                saveBtn.disabled = false;
                saveBtn.textContent = 'Guardar';
            });
        }
    </script>
</body>
</html>

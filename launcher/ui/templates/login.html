<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso — AI Ecosystem</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 48px 64px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 380px;
            width: 90%;
        }
        h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 28px; }
        .field { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 0.85rem; color: #6c757d; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: #007bff; }
        button {
            width: 100%;
            padding: 11px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }
        button:hover { background: #0056b3; }
        .error { color: #dc3545; font-size: 0.85rem; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>AI Ecosystem</h2>
        {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
        <form method="POST" action="/auth/login">
            <div class="field">
                <label>Usuario</label>
                <input type="text" name="user" autofocus autocomplete="username">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="pass" autocomplete="current-password">
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>

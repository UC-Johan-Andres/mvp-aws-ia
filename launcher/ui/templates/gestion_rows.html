<div class="card-body">
    <h4 class="section-title">USUARIOS - PRUEBA</h4>

    <div id="users-table">
        {{.Users | html}}
    </div>

    <div class="form-section">
        <h4 class="section-title">CREAR USUARIO(S)</h4>

        <div class="toggle-group">
            <label class="toggle-label">
                <input type="radio" name="method" value="form" checked
                       onchange="toggleMethod('form')">
                Formulario
            </label>
            <label class="toggle-label">
                <input type="radio" name="method" value="csv"
                       onchange="toggleMethod('csv')">
                CSV
            </label>
        </div>

        <form id="form-method" hx-post="/gestion" hx-target="#toasts" hx-swap="beforeend"
              onsubmit="return handleSubmit(event)">
            <input type="hidden" name="tab" value="{{.Tab}}">

            <div class="dynamic-form {{.Tab}}-form">
                <div class="rows-container">
                    {{if eq .Tab "n8n"}}
                    <div class="form-row">
                        <input type="email" name="email" placeholder="email@ejemplo.com" required>
                        <select name="role">
                            <option value="global:member">global:member</option>
                            <option value="global:owner">global:owner</option>
                        </select>
                        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
                    </div>
                    {{else}}
                    <div class="form-row">
                        <input type="email" name="email" placeholder="email@ejemplo.com" required>
                        <input type="text" name="name" placeholder="Nombre">
                        <input type="password" name="password" placeholder="Contraseña" required>
                        <select name="role">
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">&times;</button>
                    </div>
                    {{end}}
                </div>
                <button type="button" class="btn-add-row" onclick="addRow()">+ Agregar fila</button>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="resetForm()">Cancelar</button>
                <button type="submit" class="btn-submit">Crear Usuario(s)</button>
            </div>
        </form>

        <form id="csv-method" class="csv-zone" hx-post="/gestion" hx-target="#toasts" hx-swap="beforeend"
              onsubmit="return handleCSVSubmit(event)">
            <input type="hidden" name="tab" value="{{.Tab}}">
            <p>Arrastra un archivo CSV aqui o selecciona:</p>
            <input type="file" accept=".csv" onchange="handleCSVUpload(this)">
            <div id="csv-preview" class="csv-preview" style="display:none;"></div>
            <input type="hidden" name="csv_data" id="csv-data">
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="resetForm()">Cancelar</button>
                <button type="submit" class="btn-submit">Crear Usuario(s)</button>
            </div>
        </form>
    </div>
</div>

<script>
    function handleSubmit(evt) {
        evt.preventDefault();
        const form = evt.target;
        const formData = new FormData(form);

        fetch('/gestion', {
            method: 'POST',
            body: formData,
            headers: {
                'Cookie': document.cookie
            }
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                showToast('Error: ' + data.error, 'error');
            } else {
                showToast('Usuario(s) creado(s) exitosamente', 'success');
                resetForm();
                htmx.ajax('GET', '/gestion/users-rows?tab={{.Tab}}', {
                    target: '#users-table',
                    swap: 'innerHTML'
                });
            }
        })
        .catch(err => {
            showToast('Error: ' + err.message, 'error');
        });

        return false;
    }

    function handleCSVSubmit(evt) {
        evt.preventDefault();
        const csvData = document.getElementById('csv-data').value;
        if (!csvData) {
            showToast('Selecciona un archivo CSV', 'error');
            return false;
        }

        const tab = '{{.Tab}}';
        const lines = csvData.trim().split('\n');
        const users = [];

        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',').map(c => c.trim());
            if (tab === 'n8n') {
                users.push({ email: cols[0], role: cols[1] || 'global:member' });
            } else {
                users.push({ email: cols[0], name: cols[1] || '', password: cols[2] || '', role: cols[3] || 'USER' });
            }
        }

        fetch('/gestion', {
            method: 'POST',
            body: new URLSearchParams({ tab: tab, users_json: JSON.stringify(users) }),
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Cookie': document.cookie
            }
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                showToast('Error: ' + data.error, 'error');
            } else {
                showToast('Usuario(s) creado(s) exitosamente', 'success');
                resetForm();
                htmx.ajax('GET', '/gestion/users-rows?tab={{.Tab}}', {
                    target: '#users-table',
                    swap: 'innerHTML'
                });
            }
        })
        .catch(err => {
            showToast('Error: ' + err.message, 'error');
        });

        return false;
    }

    function resetForm() {
        document.querySelectorAll('input[name="method"]')[0].checked = true;
        toggleMethod('form');
        document.getElementById('csv-preview').style.display = 'none';
        document.getElementById('csv-data').value = '';
    }
</script>

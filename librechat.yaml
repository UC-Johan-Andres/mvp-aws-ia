version: 1.3.4

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["z-ai/glm-4.5-air:free"]
        fetch: true
      titleConvo: true
      titleModel: "z-ai/glm-4.5-air:free"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

    - name: "OpenAI"
      apiKey: "user_provided"
      baseURL: "https://api.openai.com/v1"
      models:
        default: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo", "gpt-3.5-turbo"]
        fetch: false
      userProvide: true
      titleConvo: true
      titleModel: "gpt-4o-mini"
      modelDisplayLabel: "OpenAI"

    - name: "Anthropic"
      apiKey: "user_provided"
      baseURL: "https://api.anthropic.com/v1"
      models:
        default: ["claude-opus-4-6", "claude-sonnet-4-6", "claude-haiku-4-5-20251001"]
        fetch: false
      userProvide: true
      titleConvo: true
      titleModel: "claude-haiku-4-5-20251001"
      modelDisplayLabel: "Anthropic"
      addParams:
        anthropic-version: "2023-06-01"

    - name: "Google Gemini"
      apiKey: "user_provided"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai"
      models:
        default: ["gemini-2.0-flash", "gemini-2.0-flash-lite", "gemini-1.5-pro", "gemini-1.5-flash"]
        fetch: false
      userProvide: true
      titleConvo: true
      titleModel: "gemini-2.0-flash-lite"
      modelDisplayLabel: "Google Gemini"

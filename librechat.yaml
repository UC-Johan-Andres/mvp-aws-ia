# Notas de despliegue (429 / límites):
# - 429 al enviar mensaje con Gemini: casi siempre es límite o cuota de Google (a menudo sin cuerpo en la respuesta).
#   Eso no es lo mismo que un rate limit interno de LibreChat (suele venir con otro mensaje o de /api distinto).
# - Tras “probar clave”, el primer mensaje real suele llamar al modelo de chat y, si titleConvo usa el mismo endpoint,
#   también al de títulos. Los títulos para conv. iniciadas con Gemini se envían a OpenRouter para no gastar cuota Gemini.
#   Si OPENROUTER_KEY está vacío, quita titleEndpoint/titleModel aquí y deja titleModel en un modelo Gemini o titleConvo: false.
version: 1.3.4

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["z-ai/glm-4.5-air:free"]
        fetch: true
      titleConvo: true
      titleModel: "z-ai/glm-4.5-air:free"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

    - name: "OpenAI"
      apiKey: "user_provided"
      baseURL: "https://api.openai.com/v1"
      models:
        default: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo", "gpt-3.5-turbo"]
        fetch: false
      userProvide: true
      titleConvo: true
      titleModel: "gpt-4o-mini"
      modelDisplayLabel: "OpenAI"

    - name: "Anthropic"
      apiKey: "user_provided"
      baseURL: "https://api.anthropic.com/v1"
      models:
        default: ["claude-opus-4-6", "claude-sonnet-4-6", "claude-haiku-4-5-20251001"]
        fetch: false
      userProvide: true
      titleConvo: true
      titleModel: "claude-haiku-4-5-20251001"
      modelDisplayLabel: "Anthropic"
      addParams:
        anthropic-version: "2023-06-01"

    - name: "Google Gemini"
      apiKey: "user_provided"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai"
      models:
        default: ["gemini-2.0-flash", "gemini-2.0-flash-lite", "gemini-1.5-pro", "gemini-1.5-flash"]
        fetch: false
      userProvide: true
      titleConvo: true
      # Títulos fuera de Google → menos 429 “justo después de validar la clave” (antes: chat + título = 2× Gemini).
      titleEndpoint: "OpenRouter"
      titleModel: "z-ai/glm-4.5-air:free"
      modelDisplayLabel: "Google Gemini"
